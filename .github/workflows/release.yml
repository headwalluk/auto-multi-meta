name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          # Remove 'v' prefix from tag (v0.4.0 -> 0.4.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Plugin version: ${VERSION}"

      - name: Prepare plugin directory
        run: |
          mkdir -p build
          rsync -av --exclude-from=.distignore ./ build/auto-multi-meta/

      - name: Create versioned zip
        run: |
          cd build
          zip -r auto-multi-meta-${{ steps.get_version.outputs.version }}.zip auto-multi-meta/
          cd ..

      - name: Create generic zip
        run: |
          cd build
          zip -r auto-multi-meta.zip auto-multi-meta/
          cd ..

      - name: Upload versioned zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-multi-meta-${{ steps.get_version.outputs.version }}
          path: build/auto-multi-meta-${{ steps.get_version.outputs.version }}.zip

      - name: Upload generic zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-multi-meta
          path: build/auto-multi-meta.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/auto-multi-meta-${{ steps.get_version.outputs.version }}.zip
            build/auto-multi-meta.zip
          body: |
            **Auto Multi-Meta v${{ steps.get_version.outputs.version }}**

            Download the zip file and install via WordPress admin or upload to your plugins directory.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
